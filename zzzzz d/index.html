<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AZSoftware - İşçi Əlaqə Sistemi</title>
    <link rel="stylesheet" href="style1.css">
    <style>
        
        
    </style>
</head>
<body>
    <div class="login-container">
       
        <div class="logo">
            <h1>🔷 Azsoftware</h1>
            <p>Daxili Əlaqə Platforması</p>
        </div>
        <div class="login-box">
            <h2>Sistemə Giriş</h2>
            <form id="loginForm"onsubmit="event.preventDefault(); saveData();">
                <div class="input-group">
                    <label>Ad Soyad</label>
                    <div class="baku">
    <div class="relative flex items-center">
        <input
            class="bg-transparent border-0 border-b-2 
            border-input-border-light dark:border-input-border-dark
            text-text-light dark:text-white
            placeholder-gray-400 dark:placeholder-gray-500
            focus:ring-0 focus:border-primary
            py-3 pr-10 text-base transition-colors w-full"
            id="username_input"
            placeholder="İstifadəçi adını daxil edin"
            type="text"
        />
    </div>
                
                </div>
                
                <div class="input-group">
                    <label>Şöbə</label>
                    <select id="department" required>
                        <option value="">Seçin...</option>
                        <option value="Quality Assurance">Quality Assurance</option>
                        <option value="Development">Development</option>
                        <option value="Design">Design</option>
                        <option value="Marketing">Marketing</option>
                        <option value="HR">HR</option>
                        <option value="Management">Management</option>
                    </select>
                </div>
                
                
                <div class="pt-6">
            <button type="submit" class="btn-primary ">
    Qeydiyyat
</button>
        </div>
                <div class="loading" id="loading"></div>
            </form>
            
            <div class="info-box">
                <p>💡 <strong>Qeyd:</strong> HR şöbəsi admin panelinə sahibdir.</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        // 🔽 SİZİN CONFIG MƏLUMATLARINIZ - BURAYA YAPIŞDIRIN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onDisconnect, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBUj0C-F0MYDheMMhnvYrLlhovCIjMuNyA",
            authDomain: "azsoftware-chat.firebaseapp.com",
            databaseURL: "https://azsoftware-chat-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "azsoftware-chat",
            storageBucket: "azsoftware-chat.firebasestorage.app",
            messagingSenderId: "195768328928",
            appId: "1:195768328928:web:104fc8883aabf648d5a685"
        };

        // Firebase başlat
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const userId = document.getElementById('userId').value.trim();
            const userName = document.getElementById('userName').value.trim();
            const department = document.getElementById('department').value;
            
            document.getElementById('loading').style.display = 'block';
            
            const userData = {
                id: userId,
                name: userName,
                department: department,
                status: 'online',
                lastSeen: Date.now()
            };
            
            try {
                // İstifadəçini online et
                const userRef = ref(database, 'users/' + userId);
                await set(userRef, userData);
                
                // Disconnect olduqda offline et
                onDisconnect(userRef).update({ 
                    status: 'offline', 
                    lastSeen: serverTimestamp() 
                });
                
                // LocalStorage-a saxla
                localStorage.setItem('azsoftware_user', JSON.stringify(userData));
                
                window.location.href = 'chat.html';
            } catch (error) {
                alert('Xəta baş verdi: ' + error.message);
                document.getElementById('loading').style.display = 'none';
            }
        });
    </script>
    <script>
function saveData() {
    const username = document.getElementById('username_input').value.trim();
    const department = document.getElementById('department').value;
    
    if (!username || !department) {
        alert('Bütün sahələri doldurun!');
        return;
    }
    
    // OBYEKT KİMİ YADDA SAXLA (loadCurrentUser-ə uyğun)
    const userData = {
        username: username,
        email: department  // department-i email kimi saxla (kod belə gözləyir)
    };
    
    localStorage.setItem('adminUser', JSON.stringify(userData));
    
    window.location.href = 'isdifadəçi1.html';
}
</script>
</body>
</html>
