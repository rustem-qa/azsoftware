function listenForNewNews() {
    const newsRef = ref(db, 'news');
    let initialLoad = true;
    
    onValue(newsRef, (snapshot) => {
        if (initialLoad) {
            initialLoad = false;
            return;
        }
        
        // Son əlavə edilən xəbəri tap
        let latestNews = null;
        let latestTime = 0;
        
        snapshot.forEach((child) => {
            const news = child.val();
            if (news.timestamp > latestTime) {
                latestTime = news.timestamp;
                latestNews = { id: child.key, ...news };
            }
        });
        
        // Son 5 saniyədə əlavə edilən xəbəri bildir
        if (latestNews && (Date.now() - latestNews.timestamp) < 5000) {
            showNewsNotification(latestNews);
            playNewsSound();
        }
    });
}

function showNewsNotification(news) {
    // Əvvəlki varsa sil
    const existing = document.getElementById('newsNotificationPopup');
    if (existing) existing.remove();
    
    const popup = document.createElement('div');
    popup.id = 'newsNotificationPopup';
    popup.className = 'fixed top-5 right-4 bg-white border-2 border-[#2d328f] rounded-xl p-4 shadow-[0_0_30px_rgba(45,50,143,0.4)] z-50 animate-slideIn max-w-sm cursor-pointer';
    popup.onclick = () => {
        window.location.href = 'xəbərlər.html';
    };
    
    popup.innerHTML = `
        <div class="flex items-start gap-3">
            <div class="w-12 h-12 rounded-full bg-gradient-to-br from-[#2d328f] to-[#1b66ea] flex items-center justify-center text-white font-bold flex-shrink-0">
                <span class="material-symbols-outlined">newspaper</span>
            </div>
            <div class="flex-1 min-w-0">
                <p class="text-[#2d328f] font-bold text-sm mb-1">Yeni Xəbər!</p>
                <p class="text-[#333333] font-medium text-sm truncate">${news.title}</p>
                <p class="text-text-secondary text-xs mt-1 line-clamp-2">${news.content.substring(0, 60)}...</p>
                <p class="text-xs text-[#1b66ea] mt-2 font-medium">Oxumaq üçün klikləyin →</p>
            </div>
            <button onclick="event.stopPropagation(); this.parentElement.parentElement.remove()" class="text-gray-400 hover:text-gray-600">
                <span class="material-symbols-outlined text-sm">close</span>
            </button>
        </div>
    `;
    
    document.body.appendChild(popup);
    
    // 10 saniyə sonra avtomatik sil
    setTimeout(() => {
        if (popup.parentElement) popup.remove();
    }, 10000);
}

    const sound = document.getElementById('newsNotificationSound');
    if (sound) {
        sound.currentTime = 0;
        sound.volume = 0.6;
        sound.play().catch(e => console.log('Səs xətası:', e));
    }
}

        // Son mesajlaşmaları yüklə
        function loadRecentChats() {
            if (!currentUser) return;
            
            // Mesajları dinlə
            const messagesRef = ref(db, 'messages');
            onValue(messagesRef, (snapshot) => {
                const userChats = {};
                
                snapshot.forEach((childSnapshot) => {
                    const chatId = childSnapshot.key;
                    if (chatId.includes(currentUser.username.toLowerCase())) {
                        const users = chatId.split('_');
                        const otherUser = users[0] === currentUser.username.toLowerCase() ? users[1] : users[0];
                        
                        let lastMessage = null;
                        let lastTime = 0;
                        let hasUnread = false;
                        
                        childSnapshot.forEach((msgSnapshot) => {
                            const msg = msgSnapshot.val();
                            if (msg.timestamp > lastTime) {
                                lastTime = msg.timestamp;
                                lastMessage = msg;
                            }
                            // Oxunmamış mesaj varmı?
                            if (msg.receiver === currentUser.username && !msg.read) {
                                hasUnread = true;
                            }
                        });
                        
                        if (lastMessage) {
                            userChats[otherUser] = {
                                username: otherUser,
                                lastMessage: lastMessage.text,
                                timestamp: lastTime,
                                sender: lastMessage.sender,
                                hasUnread: hasUnread
                            };
                        }
                    }
                });
                
                const sortedChats = Object.values(userChats).sort((a, b) => b.timestamp - a.timestamp);
                renderRecentChats(sortedChats);
            });
        }

        // Siyahını göstər (badge ilə)

                container.classList.add('hidden');
                return;
            }
            
            container.classList.remove('hidden');
            
            let html = '';

                const time = new Date(chat.timestamp).toLocaleTimeString('az-AZ', { 
                    hour: '2-digit', 
                    minute: '2-digit',
                    day: 'numeric',
                    month: 'short'
                });
                
                const isFromMe = chat.sender === currentUser.username;
                const preview = chat.lastMessage.length > 30 ? chat.lastMessage.substring(0, 30) + '...' : chat.lastMessage;
                
                // Badge varsa göstər

                // Oxunmamışsa border rəngi dəyiş
                const borderClass = chat.hasUnread ? 'border-neon-pink/50' : 'border-[#1b66ea]/50';
                const bgClass = chat.hasUnread ? 'bg-neon-purple/10' : 'bg-[#ffffff]/50';

        // Başqasının statusunu chat header-də göstər
        async function loadChatUserStatus(username) {
            const userRef = ref(db, 'users/' + username);
            const snapshot = await get(userRef);
            
            const statusEl = document.getElementById('chatStatus');
            if (!statusEl) return;
            
            if (snapshot.exists()) {
                const userData = snapshot.val();
                const status = userData.status || 'online';
                const lastSeen = userData.lastSeen;
                
                const statusColors = {
                    'online': 'text-green-400',
                    'away': 'text-yellow-400',
                    'dnd': 'text-red-400',
                    'invisible': 'text-gray-400'
                };
                
                const statusTexts = {
                    'online': '● Onlayn',
                    'away': '● Uzaqda',
                    'dnd': '● Məşğul',
                    'invisible': '● Son görülmə: ' + new Date(lastSeen).toLocaleTimeString('az-AZ', {hour: '2-digit', minute:'2-digit'})
                };
                
                statusEl.innerHTML = `<span class="${statusColors[status]}">${statusTexts[status]}</span>`;
            } else {
                statusEl.innerHTML = '<span class="text-gray-400">● Naməlum</span>';
            }
        }

        // Chat aç və badge sil (oxundu olaraq işarələ)
        window.openRecentChatWithBadge = async function(username) {
            try {
                // Öncə mesajları oxundu olaraq işarələ
                const chatId = getChatId(currentUser.username, username);
                const messagesRef = ref(db, 'messages/' + chatId);
                const snapshot = await get(messagesRef);
                
                const updates = {};
                snapshot.forEach((childSnapshot) => {
                    const msg = childSnapshot.val();
                    if (msg.receiver === currentUser.username && !msg.read) {
                        updates[childSnapshot.key + '/read'] = true;
                    }
                });
                
                // Firebase-də yenilə
                if (Object.keys(updates).length > 0) {
                    snapshot.forEach((childSnapshot) => {
                        if (updates[childSnapshot.key + '/read']) {
                            const msgRef = ref(db, 'messages/' + chatId + '/' + childSnapshot.key);
                            set(msgRef, {...childSnapshot.val(), read: true});
                        }
                    });
                }
                
                // İstifadəçini tap
                const userRef = ref(db, 'users/' + username);
                const userSnapshot = await get(userRef);
                
                if (userSnapshot.exists()) {
                    selectedUser = userSnapshot.val();
                } else {
                    selectedUser = { username: username };
                }
                
                // Chat-i aç
                document.getElementById('chatInterface').classList.remove('hidden');
                document.getElementById('chatUsername').innerText = username;
                document.getElementById('chatAvatar').textContent = username.charAt(0).toUpperCase();
                
                // Axtarışı təmizlə
                document.getElementById('searchResults').innerHTML = '';
                document.getElementById('searchUserInput').value = '';
                
                // Siyahını yenilə (badge silinsin)
                loadRecentChats();
                
                // Statusu yüklə
                loadChatUserStatus(username);
                
                // Mesajları yüklə
                loadMessages();
                
            } catch (error) {
                console.error('Chat açma xətası:', error);
            }
        };

        // Mesajlaşma başlat
        window.startChat = function() {
            if (!selectedUser) return;
            
            document.getElementById('chatInterface').classList.remove('hidden');
            document.getElementById('chatUsername').innerText = selectedUser.username;
            document.getElementById('chatAvatar').textContent = selectedUser.username.charAt(0).toUpperCase();
            document.getElementById('searchResults').innerHTML = '';
            document.getElementById('searchUserInput').value = '';
            
            // Mesajları yüklə
            loadMessages();
        };

        // Mesajları yüklə (real-time)
        function loadMessages() {
            const chatId = getChatId(currentUser.username, selectedUser.username);
            messagesRef = ref(db, 'messages/' + chatId);
            
            onValue(messagesRef, (snapshot) => {
                const messagesDiv = document.getElementById('messagesContainer');
                messagesDiv.innerHTML = '';
                
                const messages = [];
                snapshot.forEach((childSnapshot) => {
                    messages.push(childSnapshot.val());
                });
                
                // Vaxta görə sırala
                messages.sort((a, b) => a.timestamp - b.timestamp);
                
                messages.forEach((msg) => {
                    displayMessage(msg);
                });
                
                // Aşağıya scroll
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            });
        }

        // Chat ID yarat (hər iki istifadəçi üçün eyni)
        function getChatId(user1, user2) {
            const users = [user1.toLowerCase(), user2.toLowerCase()].sort();
            return users.join('_');
        }

        // Mesaj göstər
        function displayMessage(msg) {
            const messagesDiv = document.getElementById('messagesContainer');
            const isSender = msg.sender === currentUser.username;
            
            const msgDiv = document.createElement('div');
            msgDiv.className = `flex ${isSender ? 'justify-end' : 'justify-start'} mb-3`;
            
            const time = new Date(msg.timestamp).toLocaleTimeString('az-AZ', { 
                hour: '2-digit', 
                minute: '2-digit' 
            });
            
            msgDiv.innerHTML = `
                <div class="max-w-[70%] ${isSender ? 'bg-gradient-to-r from-[#2d328f] to-[#1b66ea]' : 'bg-[#ffffff] border border-[#1b66ea]/50'} rounded-2xl px-4 py-2 shadow-lg">
                    <p class="text-[#333333] text-sm mb-1">${msg.text}</p>
                    <p class="text-xs ${isSender ? 'text-[#333333]/70' : 'text-text-secondary'} text-right">${time}</p>
                </div>
            `;
            
            messagesDiv.appendChild(msgDiv);
        }

        // Mesaj göndər
        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text || !selectedUser) return;
            
            const chatId = getChatId(currentUser.username, selectedUser.username);
            const messagesRef = ref(db, 'messages/' + chatId);
            
            try {
                // Mesajı göndər
                await push(messagesRef, {
                    text: text,
                    sender: currentUser.username,
                    receiver: selectedUser.username,
                    timestamp: Date.now()
                });
                
                // Qarşı tərəfə bildiriş göndər
                const notifRef = ref(db, 'users/' + selectedUser.username + '/notifications');
                await push(notifRef, {
                    from: currentUser.username,
                    message: text,
                    timestamp: Date.now(),
                    read: false,
                    shown: false
                });
                
                input.value = '';
            } catch (error) {
                console.error("Mesaj göndərmə xətası:", error);
                alert("Mesaj göndərilmədi!");
            }
        };

        // Bildirişləri dinlə
        function listenForNotifications() {
            const userRef = ref(db, 'users/' + currentUser.username + '/notifications');
            onValue(userRef, (snapshot) => {
                let unreadCount = 0;
                const notifications = [];
                
                snapshot.forEach((childSnapshot) => {
                    const notif = childSnapshot.val();
                    if (!notif.read) {
                        unreadCount++;
                        notifications.push({key: childSnapshot.key, ...notif});
                    }
                });
                
                // Badge göstər
                updateNotificationBadge(unreadCount);
                
                // Yeni bildiriş gəldikdə səs çal və göstər
                notifications.forEach((notif) => {
                    if (!notif.shown) {
                        showNotificationPopup(notif);
                        playNotificationSound();
                        // Bildirişi shown olaraq işarələ
                        const notifRef = ref(db, 'users/' + currentUser.username + '/notifications/' + notif.key);
                        set(notifRef, {...notif, shown: true});
                    }
                });
            });
        }

        // Badge yenilə
        function updateNotificationBadge(count) {

                const messengerHeader = document.querySelector('h4.text-lg.font-bold');

        // Gələn zəngləri dinlə
        function listenForIncomingCalls() {
            const callsRef = ref(db, 'calls');
            onValue(callsRef, (snapshot) => {
                snapshot.forEach((child) => {
                    const call = child.val();
                    // Yalnız mənə gələn və cavab verilməmiş zənglər
                    if (call.callee === currentUser.username && call.status === 'calling' && !document.getElementById('incomingCallPopup')) {
                        showIncomingCall(call, child.key);
                    }
                });
            });
        }

        // Gələn zəngi göstər
        function showIncomingCall(call, callKey) {
            // Musiqi çal
            playCallRingtone();
            
            const popup = document.createElement('div');
            popup.id = 'incomingCallPopup';
            popup.className = 'fixed inset-0 bg-black/70 flex items-center justify-center z-50 backdrop-blur-sm';
            popup.innerHTML = `

                    <div class="flex gap-4 justify-center">

                            <span class="material-symbols-outlined">call_end</span>

                        </button>
                        <button onclick="acceptCall('${callKey}')" class="px-8 py-4 bg-green-500 text-white rounded-xl hover:bg-green-600 transition-all flex items-center gap-2 text-lg">
                            <span class="material-symbols-outlined">call</span>
                            Cavab ver
                        </button>
                    </div>
                </div>
            `;
            document.body.appendChild(popup);

        // Zəng musiqisini çal
        function playCallRingtone() {
            const audio = document.getElementById('callRingtone');
            if (audio) {
                audio.currentTime = 0;
                audio.volume = 0.7;
                audio.play().catch(e => console.log('Musiqini oxutma xətası:', e));
            }
        }

        // Zəng musiqisini dayandır
        function stopCallRingtone() {
            const audio = document.getElementById('callRingtone');
            if (audio) {
                audio.pause();
                audio.currentTime = 0;
            }
        }

        // Zəngə cavab ver - videocall.html-ə yönləndir
        window.acceptCall = async function(callKey) {
            stopCallRingtone();
            const popup = document.getElementById('incomingCallPopup');
            if (popup) popup.remove();
            
            // Zəng məlumatlarını localStorage-da saxla
            localStorage.setItem('incomingCall', JSON.stringify({
                callId: callKey,
                action: 'accept'
            }));
            
            // videocall.html-ə yönləndir
            window.location.href = 'videocall.html';
        };

        // Zəngi rədd et
        window.rejectCall = async function(callKey) {
            stopCallRingtone();
            const popup = document.getElementById('incomingCallPopup');
            if (popup) popup.remove();
            
            const callRef = ref(db, `calls/${callKey}`);
            await update(callRef, {
                status: 'rejected'
            });
            
            setTimeout(() => remove(callRef), 3000);
        };

        // Səhifə yüklənəndə gələn zəngləri dinləməyə başla
        listenForIncomingCalls();
