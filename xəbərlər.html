<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xəbərlər - AZSoftware</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Material Symbols - DÜZƏLDİLDİ: weights və fill parametrləri ayrıca -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Notification Sound -->
    <audio id="notificationSound" preload="auto">
        <source src="https://proxy.notificationsounds.com/notification-sounds/ringtone-you-would-be-glad-to-know/download/file-sounds-1350-you-would-be-glad.ogg" type="audio/ogg">
    </audio>
    <!-- Yeni xəbər bildiriş səsi -->
    <audio id="newsNotificationSound" preload="auto">
        <source src="https://proxy.notificationsounds.com/notification-sounds/notification-bell-percussion-533/download/file-sounds-1236-notification-bell.ogg" type="audio/ogg">
    </audio>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2d328f",
                        "background-light": "#ffffff",
                        "background-dark": "#ffffff",
                        "neon-purple": "#2d328f",
                        "neon-pink": "#2d328f",
                        "surface-dark": "#ffffff",
                        "text-secondary": "#666666",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    }
                }
            }
        }
    </script>
    
    <style>
        /* Scroll styles */
        .custom-scroll {
            scrollbar-width: thin;
            scrollbar-color: rgba(45, 50, 143, 0.5) transparent;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background-color: rgba(45, 50, 143, 0.5);
            border-radius: 20px;
        }
        
        /* Animations */
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-slideIn { animation: slideIn 0.3s ease-out; }
        .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
        
        /* Vote buttons */
        .vote-btn { transition: all 0.2s; }
        .vote-btn:hover { transform: scale(1.1); }
        .vote-btn.active-up { color: #22c55e; }
        .vote-btn.active-down { color: #ef4444; }
        
        /* File attachment */
        .file-attachment {
            border: 1px solid rgba(45, 50, 143, 0.3);
            transition: all 0.3s;
        }
        .file-attachment:hover {
            border-color: #2d328f;
            box-shadow: 0 2px 8px rgba(45, 50, 143, 0.15);
        }
        
        /* HR Admin badge */
        .hr-badge {
            background: linear-gradient(135deg, #2d328f, #1b66ea);
            color: white;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 600;
        }
        
        /* News card hover */
        .news-card {
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .news-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(45, 50, 143, 0.15);
        }
        
        /* Comment bubble */
        .comment-bubble {
            background: #f8fafc;
            border-left: 3px solid #2d328f;
        }
        
        /* Loading spinner */
        .spinner {
            border: 3px solid rgba(45, 50, 143, 0.2);
            border-top: 3px solid #2d328f;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* RESPONSIVE GRID STYLES - YENI */
        .news-grid-container {
            display: grid;
            gap: 1.5rem;
            width: 100%;
        }

        /* 1919px və daha böyük ekranlarda bir sırada 4+ kart */
        @media screen and (min-width: 1920px) {
            .news-grid-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* 1919px - 1280px arası bir sırada 4 kart */
        @media screen and (min-width: 1280px) and (max-width: 1919px) {
            .news-grid-container {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* 1279px - 1024px arası bir sırada 3 kart */
        @media screen and (min-width: 1024px) and (max-width: 1279px) {
            .news-grid-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* 1023px - 768px arası bir sırada 2 kart */
        @media screen and (min-width: 768px) and (max-width: 1023px) {
            .news-grid-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* 767px və daha kiçik ekranlarda bir sırada 1 kart */
        @media screen and (max-width: 767px) {
            .news-grid-container {
                grid-template-columns: 1fr;
            }
        }

        /* 2560px və daha böyük ultra geniş ekranlarda bir sırada 5 kart */
        @media screen and (min-width: 2560px) {
            .news-grid-container {
                grid-template-columns: repeat(5, 1fr);
            }
        }

        /* Kartların hündürlüyünü bərabər saxlamaq üçün */
        .news-card {
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .news-card .content-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        /* Line clamp for card content preview */
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* SORĞU STILLƏRİ */
        .poll-option {
            transition: all 0.3s ease;
        }
        .poll-option:hover {
            background-color: rgba(45, 50, 143, 0.05);
        }
        .poll-option.selected {
            background-color: rgba(45, 50, 143, 0.1);
            border-color: #2d328f;
        }
        .poll-bar {
            transition: width 0.5s ease;
        }
        .voters-list {
            max-height: 200px;
            overflow-y: auto;
        }
        
        /* Kateqoriya nişanı - sağ üst köşə */
        .category-badge-top {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 10;
        }
        
        /* Modal bağlama düyməsi - fixed */
        .modal-close-fixed {
            position: sticky;
            top: 0;
            right: 0;
            z-index: 50;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(4px);
        }
    </style>
</head>

<body class="bg-background-light text-[#333333] font-display h-screen overflow-hidden">
    
    <!-- FIREBASE SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, remove, update, query, orderByChild } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyDli-QC8Vt17pjESnHhwzfkwIDLSW9hHyA",
            authDomain: "realtime-database-37f15.firebaseapp.com",
            databaseURL: "https://realtime-database-37f15-default-rtdb.firebaseio.com",
            projectId: "realtime-database-37f15",
            storageBucket: "realtime-database-37f15.firebasestorage.app",
            messagingSenderId: "71634699985",
            appId: "1:71634699985:web:fc3ab99eb5db32da7ca7f0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Global deyisenler
        let currentUser = null;
        let isHR = false;
        let editingNewsId = null;
        let attachedFiles = [];
        let currentOpenNewsId = null;
        let currentOpenPollId = null;
        let pollOptions = [];

        // Istifadeci melumatini yukle
        function loadCurrentUser() {
            const data = localStorage.getItem('adminUser');
            if (!data) {
                alert("Giriş tələb olunur!");
                window.location.href = "index.html";
                return;
            }
            
            currentUser = JSON.parse(data);
            
            // HR yoxlamasi
            isHR = (currentUser.email === 'HR' || currentUser.department === 'HR');
            
            // Header melumatlarini yenile
            document.getElementById('headerUsername').innerText = currentUser.username;
            document.getElementById('headerAvatar').innerText = currentUser.username.charAt(0).toUpperCase();
            document.getElementById('currentUserDisplay').innerText = currentUser.username;
            
            // HR ise xəbər əlavə et düyməsini göstər
            if (isHR) {
                document.getElementById('hrControls').classList.remove('hidden');
                document.getElementById('userHRBadge').classList.remove('hidden');
            }
            
            // Firebase-də istifadəçini online et
            const userRef = ref(db, 'users/' + currentUser.username);
            set(userRef, {
                username: currentUser.username,
                email: currentUser.email || currentUser.department || '',
                lastSeen: Date.now(),
                online: true
            });
            
            // Xəbərləri yüklə
            loadNews();
            
            // YENI: Xəbər bildirişlərini dinlə
            listenForNewNews();
            
            // SMS bildirişlərini dinlə (YALNIZ SMS üçün)
            listenForNotifications();
        }

        // ==================== YENI XƏBƏR BİLDİRİŞ FUNKSİYALLIĞI ====================
        
        // Yeni xəbərləri dinlə
        function listenForNewNews() {
            const newsRef = ref(db, 'news');
            let initialLoad = true;
            
            onValue(newsRef, (snapshot) => {
                if (initialLoad) {
                    initialLoad = false;
                    return;
                }
                
                // Son əlavə edilən xəbəri tap
                let latestNews = null;
                let latestTime = 0;
                
                snapshot.forEach((child) => {
                    const news = child.val();
                    if (news.timestamp > latestTime) {
                        latestTime = news.timestamp;
                        latestNews = { id: child.key, ...news };
                    }
                });
                
                // Son 5 saniyədə əlavə edilən xəbəri bildir
                if (latestNews && (Date.now() - latestNews.timestamp) < 5000) {
                    // Özünün yaratdığı xəbəri göstərmə
                    if (latestNews.author !== currentUser.username) {
                        showNewsNotification(latestNews);
                        playNewsSound();
                    }
                }
            });
        }

        // Xəbər bildiriş popup-u göstər (FƏRQLİ UI)
        function showNewsNotification(news) {
            // Əvvəlki varsa sil
            const existing = document.getElementById('newsNotificationPopup');
            if (existing) existing.remove();
            
            const popup = document.createElement('div');
            popup.id = 'newsNotificationPopup';
            popup.className = 'fixed top-5 right-4 bg-white border-2 border-[#2d328f] rounded-xl p-4 shadow-[0_0_30px_rgba(45,50,143,0.4)] z-50 animate-slideIn max-w-sm cursor-pointer';
            popup.onclick = () => {
                window.location.href = 'xəbərlər.html';
            };
            
            popup.innerHTML = `
                <div class="flex items-start gap-3">
                    <div class="w-12 h-12 rounded-full bg-gradient-to-br from-[#2d328f] to-[#1b66ea] flex items-center justify-center text-white font-bold flex-shrink-0">
                        <span class="material-symbols-outlined">newspaper</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-[#2d328f] font-bold text-sm mb-1">Yeni Xəbər!</p>
                        <p class="text-[#333333] font-medium text-sm truncate">${news.title}</p>
                        <p class="text-text-secondary text-xs mt-1 line-clamp-2">${news.content.substring(0, 60)}...</p>
                        <p class="text-xs text-[#1b66ea] mt-2 font-medium">Oxumaq üçün klikləyin →</p>
                    </div>
                    <button onclick="event.stopPropagation(); this.parentElement.parentElement.remove()" class="text-gray-400 hover:text-gray-600">
                        <span class="material-symbols-outlined text-sm">close</span>
                    </button>
                </div>
            `;
            
            document.body.appendChild(popup);
            
            // 10 saniyə sonra avtomatik sil
            setTimeout(() => {
                if (popup.parentElement) popup.remove();
            }, 10000);
        }

        // Xəbər bildiriş səsi çal
        function playNewsSound() {
            const sound = document.getElementById('newsNotificationSound');
            if (sound) {
                sound.currentTime = 0;
                sound.volume = 0.6;
                sound.play().catch(e => console.log('Səs xətası:', e));
            }
        }

        // ==================== SMS BİLDİRİŞ FUNKSİYALLIĞI (YALNIZ SMS) ====================
        
        function listenForNotifications() {
            const userRef = ref(db, 'users/' + currentUser.username + '/notifications');
            onValue(userRef, (snapshot) => {
                let unreadCount = 0;
                
                snapshot.forEach((childSnapshot) => {
                    const notif = childSnapshot.val();
                    if (!notif.read) {
                        unreadCount++;
                        
                        // YALNIZ SMS BİLDİRİŞLƏRİ (type !== 'news' və ya type yoxdur)
                        if (!notif.shown && (!notif.type || notif.type !== 'news')) {
                            showNotificationPopup(notif);
                            playNotificationSound();
                            
                            // shown olaraq işarələ
                            const notifRef = ref(db, 'users/' + currentUser.username + '/notifications/' + childSnapshot.key);
                            set(notifRef, {...notif, shown: true});
                        }
                    }
                });
                
                updateNotificationBadge(unreadCount);
            });
        }

        // SMS bildiriş popup-u (FƏRQLİ UI)
        function showNotificationPopup(notif) {
            const popup = document.createElement('div');
            popup.className = 'fixed top-20 right-4 bg-[#ffffff] border border-[#2d328f] rounded-xl p-4 shadow-[0_0_30px_rgba(45,50,143,0.4)] z-50 animate-slideIn max-w-xs';
            popup.innerHTML = `
                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#2d328f] to-[#2d328f] flex items-center justify-center text-white font-bold flex-shrink-0">
                        ${notif.from.charAt(0).toUpperCase()}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-[#333333] font-medium text-sm truncate">${notif.from}</p>
                        <p class="text-text-secondary text-xs mt-1 line-clamp-2">${notif.message}</p>
                    </div>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-text-secondary hover:text-[#333333]">
                        <span class="material-symbols-outlined text-sm">close</span>
                    </button>
                </div>
                <a href="sms.html"><button class="w-full mt-3 py-2 bg-[#2d328f]/20 hover:bg-[#2d328f]/40 text-[#333333] text-xs rounded-lg transition-all">
                    Cavab yaz
                </button></a>
            `;
            
            document.body.appendChild(popup);
            
            setTimeout(() => {
                if (popup.parentElement) popup.remove();
            }, 8000);
        }

        function playNotificationSound() {
            const sound = document.getElementById('notificationSound');
            if (sound) {
                sound.currentTime = 0;
                sound.volume = 0.5;
                sound.play().catch(e => console.log('Səs xətası:', e));
            }
        }

        function updateNotificationBadge(count) {
            // Implementasiya əgər lazımdırsa
        }

        // ==================== XƏBƏR POPUP FUNKSİYALLIĞI ====================
        
        window.openNewsDetail = function(newsId) {
            currentOpenNewsId = newsId;
            const newsRef = ref(db, `news/${newsId}`);
            
            get(newsRef).then((snapshot) => {
                if (!snapshot.exists()) return;
                
                const news = snapshot.val();
                const categoryLabels = {
                    'general': 'Ümumi',
                    'announcement': 'Elan',
                    'event': 'Tədbir',
                    'hr': 'İşə Qəbul',
                    'promotion': 'Vəzifə Yüksəlişi',
                    'birthday': 'Ad Günü',
                    'achievement': 'Uğur'
                };

                const categoryColors = {
                    'general': 'bg-gray-100 text-gray-600',
                    'announcement': 'bg-blue-100 text-blue-600',
                    'event': 'bg-green-100 text-green-600',
                    'hr': 'bg-purple-100 text-purple-600',
                    'promotion': 'bg-yellow-100 text-yellow-600',
                    'birthday': 'bg-pink-100 text-pink-600',
                    'achievement': 'bg-orange-100 text-orange-600'
                };
                
                const date = new Date(news.timestamp).toLocaleString('az-AZ', {
                    day: 'numeric',
                    month: 'long',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                
                const voteCount = news.voteCount || 0;
                const userVote = news.votes?.[currentUser.username] || null;
                const catLabel = categoryLabels[news.category] || 'Ümumi';
                const catColor = categoryColors[news.category] || 'bg-gray-100 text-gray-600';
                
                // Fayllar
                let filesHtml = '';
                if (news.files && news.files.length > 0) {
                    filesHtml = `<div class="flex flex-wrap gap-3 mt-4">`;
                    news.files.forEach(file => {
                        const isImage = file.type && file.type.startsWith('image/');
                        const icon = isImage ? 'image' : 'description';
                        
                        filesHtml += `
                            <a href="${file.data}" download="${file.name}" class="file-attachment flex items-center gap-2 px-4 py-3 bg-white rounded-lg hover:bg-gray-50">
                                <span class="material-symbols-outlined text-[#2d328f]">${icon}</span>
                                <span class="truncate max-w-[200px]">${file.name}</span>
                                <span class="text-xs text-gray-400">(${formatFileSize(file.size)})</span>
                                <span class="material-symbols-outlined text-sm ml-1">download</span>
                            </a>
                        `;
                    });
                    filesHtml += `</div>`;
                }
                
                // HR üçün redaktə/sil/pin düymələri
                let adminControls = '';
                if (isHR) {
                    adminControls = `
                        <div class="flex gap-2">
                            <button onclick="event.stopPropagation(); togglePin('${newsId}')" class="p-2 ${news.isPinned ? 'text-yellow-500 bg-yellow-50' : 'text-gray-400 hover:text-yellow-500'} rounded-lg transition-all" title="${news.isPinned ? 'Pin-i çıxar' : 'Pin et'}">
                                <span class="material-symbols-outlined">${news.isPinned ? 'push_pin' : 'push_pin'}</span>
                            </button>
                            <button onclick="event.stopPropagation(); editNews('${newsId}')" class="p-2 text-[#1b66ea] hover:bg-[#1b66ea]/10 rounded-lg transition-all" title="Redaktə et">
                                <span class="material-symbols-outlined">edit</span>
                            </button>
                            <button onclick="event.stopPropagation(); deleteNews('${newsId}')" class="p-2 text-red-500 hover:bg-red-50 rounded-lg transition-all" title="Sil">
                                <span class="material-symbols-outlined">delete</span>
                            </button>
                        </div>
                    `;
                }
                
                document.getElementById('detailModalTitle').innerText = news.title;
                document.getElementById('detailModalContent').innerHTML = `
                    <div class="space-y-4">
                        <!-- Header -->
                        <div class="flex items-start justify-between pb-4 border-b border-gray-100">
                            <div class="flex items-center gap-3">
                                <div class="w-12 h-12 rounded-full bg-gradient-to-br from-[#2d328f] to-[#1b66ea] flex items-center justify-center text-white font-bold text-lg">
                                    ${news.author.charAt(0).toUpperCase()}
                                </div>
                                <div>
                                    <div class="flex items-center gap-2">
                                        <span class="font-semibold text-[#333333]">${news.author}</span>
                                        ${news.authorDept === 'HR' ? '<span class="hr-badge">HR</span>' : ''}
                                        <span class="${catColor} text-xs px-2 py-1 rounded-full font-medium">${catLabel}</span>
                                        ${news.isPinned ? '<span class="text-yellow-500"><span class="material-symbols-outlined text-sm">push_pin</span></span>' : ''}
                                    </div>
                                    <span class="text-xs text-text-secondary">${date}</span>
                                </div>
                            </div>
                            ${adminControls}
                        </div>
                        
                        <!-- Content -->
                        <div class="text-[#333333] leading-relaxed whitespace-pre-wrap text-base">${news.content}</div>
                        
                        <!-- Files -->
                        ${filesHtml}
                        
                        <!-- Actions (Vote & Comments Count) -->
                        <div class="flex items-center gap-6 pt-4 border-t border-gray-100">
                            
                            <div class="flex items-center gap-2 text-text-secondary">
                                <span class="material-symbols-outlined text-xl">chat_bubble</span>
                                <span class="text-sm">Şərhlər</span>
                                <span class="text-xs bg-[#2d328f] text-white px-2 py-0.5 rounded-full" id="detail-comment-count-${newsId}">0</span>
                            </div>
                        </div>
                        
                        <!-- Comments Section -->
                        <div class="mt-6 pt-6 border-t border-gray-200">
                            <h4 class="font-semibold text-[#333333] mb-4 flex items-center gap-2">
                                <span class="material-symbols-outlined">forum</span>
                                Müzakirə
                            </h4>
                            
                            <div id="detail-comments-list-${newsId}" class="space-y-3 max-h-80 overflow-y-auto custom-scroll mb-4">
                                <p class="text-sm text-gray-400 text-center py-4">Şərhlər yüklənir...</p>
                            </div>
                            
                            <div class="flex gap-3">
                                <input type="text" id="detail-comment-input-${newsId}" placeholder="Şərhinizi yazın..." 
                                       class="flex-1 bg-gray-50 border border-gray-200 rounded-full px-4 py-3 text-sm focus:border-[#2d328f] focus:outline-none"
                                       onkeypress="if(event.key==='Enter') addCommentFromDetail('${newsId}')">
                                <button onclick="addCommentFromDetail('${newsId}')" class="px-6 py-3 rounded-full bg-gradient-to-r from-[#2d328f] to-[#1b66ea] text-white flex items-center justify-center hover:shadow-lg transition-all">
                                    <span class="material-symbols-outlined">send</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                
                document.getElementById('newsDetailModal').classList.remove('hidden');
                
                // Şərhləri yüklə
                loadCommentsForDetail(newsId);
            });
        };

        window.closeNewsDetail = function() {
            document.getElementById('newsDetailModal').classList.add('hidden');
            currentOpenNewsId = null;
        };

        window.addCommentFromDetail = async function(newsId) {
            const input = document.getElementById(`detail-comment-input-${newsId}`);
            const text = input.value.trim();
            
            if (!text) return;
            
            try {
                const commentRef = ref(db, `comments/${newsId}`);
                await push(commentRef, {
                    text: text,
                    author: currentUser.username,
                    authorDept: currentUser.email || currentUser.department || 'Naməlum',
                    timestamp: Date.now()
                });
                
                input.value = '';
                
                // Xəbər müəllifinə bildiriş göndər
                const newsRef = ref(db, `news/${newsId}`);
                const snapshot = await get(newsRef);
                const news = snapshot.val();
                
                if (news && news.author !== currentUser.username) {
                    const notifRef = ref(db, `users/${news.author}/notifications`);
                    await push(notifRef, {
                        from: currentUser.username,
                        message: `"${news.title.substring(0, 20)}..." xəbərinə şərh yazdı`,
                        timestamp: Date.now(),
                        read: false,
                        shown: false
                    });
                }
                
            } catch (error) {
                console.error('Şərh xətası:', error);
            }
        };

        function loadCommentsForDetail(newsId) {
            const commentsRef = ref(db, `comments/${newsId}`);
            
            onValue(commentsRef, (snapshot) => {
                const container = document.getElementById(`detail-comments-list-${newsId}`);
                const countBadge = document.getElementById(`detail-comment-count-${newsId}`);
                
                if (!snapshot.exists()) {
                    container.innerHTML = '<p class="text-sm text-gray-400 text-center py-4">Hələ şərh yoxdur. İlk şərhi siz yazın!</p>';
                    if (countBadge) countBadge.innerText = '0';
                    return;
                }
                
                const comments = [];
                snapshot.forEach((child) => {
                    comments.push({ id: child.key, ...child.val() });
                });
                
                if (countBadge) countBadge.innerText = comments.length;
                
                const parentComments = comments.filter(c => !c.parentId);
                const replies = comments.filter(c => c.parentId);
                
                let html = '';
                
                parentComments.forEach((comment) => {
                    html += renderCommentForDetail(comment, newsId, false);
                    
                    const commentReplies = replies.filter(r => r.parentId === comment.id);
                    commentReplies.forEach(reply => {
                        html += renderCommentForDetail(reply, newsId, true);
                    });
                });
                
                container.innerHTML = html;
                container.scrollTop = container.scrollHeight;
            });
        }

        function renderCommentForDetail(comment, newsId, isReply) {
            const time = new Date(comment.timestamp).toLocaleString('az-AZ', {
                month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });
            
            const isMyComment = comment.author === currentUser.username;
            const marginClass = isReply ? 'ml-12 border-l-2 border-gray-200 pl-4' : '';
            
            return `
                <div class="comment-bubble rounded-lg p-3 ${isMyComment ? 'bg-[#2d328f]/5' : ''} ${marginClass}" id="detail-comment-${comment.id}">
                    <div class="flex items-center justify-between mb-1">
                        <div class="flex items-center gap-2">
                            <span class="font-semibold text-sm text-[#333333]">${comment.author}</span>

                        <span class="text-xs text-gray-400">${time}</span>

                    <p class="text-sm text-[#333333] mb-2">${comment.text}</p>
                    
                    ${!isReply ? `

        window.showReplyInputDetail = function(newsId, commentId) {

            input.classList.toggle('hidden');
            if (!input.classList.contains('hidden')) {
                input.querySelector('input').focus();

        window.addReplyFromDetail = async function(newsId, parentId) {
            const input = document.querySelector(`#detail-reply-input-${parentId} input`);
            const text = input.value.trim();
            if (!text) return;
            
            const commentRef = ref(db, `comments/${newsId}`);
            await push(commentRef, {
                text: text,
                author: currentUser.username,
                authorDept: currentUser.email || currentUser.department || 'Naməlum',
                timestamp: Date.now(),
                parentId: parentId
            });
            
            input.value = '';
            document.getElementById(`detail-reply-input-${parentId}`).classList.add('hidden');

        // ==================== XƏBƏRLƏR FUNKSİYALLIĞI ====================
        
        function loadNews() {
            const newsRef = ref(db, 'news');
            const pollsRef = ref(db, 'polls');
            
            // Xəbərləri dinlə
            onValue(newsRef, (snapshot) => {
                renderContent();
            });
            
            // Sorğuları dinlə
            onValue(pollsRef, (snapshot) => {
                renderContent();
            });
        }

        function renderContent() {
            const container = document.getElementById('newsContainer');
            let allItems = [];
            
            // Xəbərləri topla
            const newsRef = ref(db, 'news');
            const pollsRef = ref(db, 'polls');
            
            Promise.all([
                get(newsRef),
                get(pollsRef)
            ]).then(([newsSnap, pollsSnap]) => {
                // Xəbərləri əlavə et
                if (newsSnap.exists()) {
                    newsSnap.forEach((child) => {
                        allItems.push({ 
                            id: child.key, 
                            ...child.val(), 
                            itemType: 'news',
                            sortTime: child.val().timestamp || 0
                        });
                    });
                }
                
                // Sorğuları əlavə et
                if (pollsSnap.exists()) {
                    pollsSnap.forEach((child) => {
                        allItems.push({ 
                            id: child.key, 
                            ...child.val(), 
                            itemType: 'poll',
                            sortTime: child.val().timestamp || 0
                        });
                    });
                }
                
                // Tarixə görə sırala (ən yeni əvvəldə)
                allItems.sort((a, b) => b.sortTime - a.sortTime);
                
                // Pin-lənmişləri əvvələ qoy
                allItems.sort((a, b) => (b.isPinned ? 1 : 0) - (a.isPinned ? 1 : 0));
                
                if (allItems.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-12 text-text-secondary col-span-full">
                            <span class="material-symbols-outlined text-6xl mb-4 text-gray-300">newspaper</span>
                            <p class="text-lg">Hələ heç bir xəbər və ya sorğu paylaşılmayıb</p>
                            ${isHR ? '<p class="text-sm mt-2">Yeni xəbər və ya sorğu əlavə etmək üçün yuxarıdakı düymələrdən istifadə edin</p>' : ''}
                        </div>
                    `;
                    return;
                }
                
                let html = '';
                const categoryLabels = {
                    'general': 'Ümumi',
                    'announcement': 'Elan',
                    'event': 'Tədbir',
                    'hr': 'İşə Qəbul',
                    'promotion': 'Vəzifə Yüksəlişi',
                    'birthday': 'Ad Günü',
                    'achievement': 'Uğur'
                };

                const categoryColors = {
                    'general': 'bg-gray-100 text-gray-600',
                    'announcement': 'bg-blue-100 text-blue-600',
                    'event': 'bg-green-100 text-green-600',
                    'hr': 'bg-purple-100 text-purple-600',
                    'promotion': 'bg-yellow-100 text-yellow-600',
                    'birthday': 'bg-pink-100 text-pink-600',
                    'achievement': 'bg-orange-100 text-orange-600'
                };
                
                // Sorğu kateqoriyası rəngləri
                const pollCategoryColor = 'bg-purple-100 text-purple-600';
                
                allItems.forEach((item, index) => {
                    if (item.itemType === 'news') {
                        html += renderNewsCard(item, index, categoryLabels, categoryColors);
                    } else {
                        html += renderPollCard(item, index, pollCategoryColor);
                    }
                });
                
                container.innerHTML = html;
            }).catch(error => {
                console.error('Yükləmə xətası:', error);
                container.innerHTML = `
                    <div class="text-center py-12 text-text-secondary col-span-full">
                        <span class="material-symbols-outlined text-6xl mb-4 text-red-300">error</span>
                        <p class="text-lg">Məlumatlar yüklənərkən xəta baş verdi</p>
                        <p class="text-sm mt-2 text-red-500">${error.message}</p>
                    </div>
                `;
            });
        }

        function renderPollCard(poll, index, pollCategoryColor) {
            const date = new Date(poll.timestamp).toLocaleString('az-AZ', {
                day: 'numeric',
                month: 'long',
                year: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });

            // Qısa variant preview (maksimum 2 variant göstər)
            let previewOptions = '';
            if (poll.options && poll.options.length > 0) {
                const showOptions = poll.options.slice(0, 2);

                    previewOptions += `
                        <div class="flex items-center justify-between text-sm mb-1 ${isSelected ? 'text-[#2d328f] font-medium' : 'text-gray-600'}">
                            <span class="flex items-center gap-2">

                        </div>
                    `;
                });
                if (poll.options.length > 2) {
                    previewOptions += `<div class="text-xs text-gray-400 mt-1">+${poll.options.length - 2} variant daha...</div>`;
                }
            }
            
            return `
                <div class="news-card bg-white rounded-2xl border border-[#2d328f]/20 p-6 animate-fadeIn relative" 
                     style="animation-delay: ${index * 0.1}s"

                     onclick="openPollDetail('${poll.id}')">
                    
                    <!-- SORĞU nişanı - SAĞ ÜST KÖŞƏ (Kateqoriya nişanı kimi) -->

                    <div class="content-wrapper">

                                </div>

                                    <div class="flex items-center gap-2 flex-wrap">
                                        <span class="font-semibold text-[#333333] text-sm">${poll.author}</span>

        // ==================== SORĞU FUNKSİYALLIĞI ====================

        window.openPollModal = function() {
            pollOptions = ['', ''];
            document.getElementById('pollTitle').value = '';
            document.getElementById('pollContent').value = '';
            renderPollOptions();
            document.getElementById('pollModal').classList.remove('hidden');
        };

        window.closePollModal = function() {
            document.getElementById('pollModal').classList.add('hidden');
            pollOptions = [];
        };

        window.renderPollOptions = function() {
            const container = document.getElementById('pollOptionsList');
            let html = '';
            
            pollOptions.forEach((option, index) => {
                html += `
                    <div class="flex gap-2 mb-2">
                        <input type="text" 
                               value="${option}" 
                               onchange="updatePollOption(${index}, this.value)"
                               placeholder="Variant ${index + 1}" 
                               class="flex-1 bg-gray-50 border border-gray-200 rounded-lg px-4 py-2 text-sm focus:border-[#10b981] focus:outline-none">
                        ${pollOptions.length > 2 ? `
                        <button onclick="removePollOption(${index})" class="text-red-500 hover:bg-red-50 p-2 rounded-lg transition-all">
                            <span class="material-symbols-outlined text-sm">delete</span>
                        </button>
                        ` : ''}
                    </div>
                `;
            });
            
            container.innerHTML = html;
        };

        window.updatePollOption = function(index, value) {
            pollOptions[index] = value;
        };

        window.addPollOption = function() {
            pollOptions.push('');
            renderPollOptions();
        };

        window.removePollOption = function(index) {
            if (pollOptions.length > 2) {
                pollOptions.splice(index, 1);
                renderPollOptions();
            }
        };

        window.savePoll = async function() {
            const title = document.getElementById('pollTitle').value.trim();
            const content = document.getElementById('pollContent').value.trim();
            
            // Boş variantları filtrlə
            const validOptions = pollOptions.filter(opt => opt.trim() !== '');
            
            if (!title || !content) {
                alert('Başlıq və məzmun doldurulmalıdır!');
                return;
            }
            
            if (validOptions.length < 2) {
                alert('Ən azı 2 variant əlavə edilməlidir!');
                return;
            }
            
            try {
                const pollData = {
                    title: title,
                    content: content,
                    options: validOptions,
                    author: currentUser.username,
                    authorDept: currentUser.email || currentUser.department || 'Naməlum',
                    timestamp: Date.now(),
                    votes: {},
                    optionVotes: {},
                    totalVotes: 0,
                    isPinned: false
                };
                
                // Hər variant üçün səs sayını 0 olaraq təyin et
                validOptions.forEach((_, idx) => {
                    pollData.optionVotes[idx] = 0;
                });
                
                const pollsRef = ref(db, 'polls');
                await push(pollsRef, pollData);
                
                closePollModal();
                
                // Bildiriş göndər
                await notifyAllUsersAboutPoll(title);
                
            } catch (error) {
                console.error('Sorğu xətası:', error);
                alert('Sorğu yaradılmadı!');
            }
        };

        window.votePoll = async function(pollId, optionIndex) {
            const pollRef = ref(db, `polls/${pollId}`);
            const snapshot = await get(pollRef);
            const poll = snapshot.val();
            
            if (!poll) return;
            
            const currentVote = poll.votes?.[currentUser.username];
            let updates = {};
            
            if (currentVote === optionIndex) {
                // Səsi geri götür
                updates[`votes/${currentUser.username}`] = null;
                updates[`optionVotes/${optionIndex}`] = (poll.optionVotes?.[optionIndex] || 0) - 1;
                updates['totalVotes'] = (poll.totalVotes || 0) - 1;
            } else {
                // Əvvəlki səsilə bağlı yeniləmələr
                if (currentVote !== undefined && currentVote !== null) {
                    updates[`optionVotes/${currentVote}`] = (poll.optionVotes?.[currentVote] || 0) - 1;
                }
                
                // Yeni səs
                updates[`votes/${currentUser.username}`] = optionIndex;
                updates[`optionVotes/${optionIndex}`] = (poll.optionVotes?.[optionIndex] || 0) + 1;
                updates['totalVotes'] = currentVote !== undefined && currentVote !== null ? poll.totalVotes : (poll.totalVotes || 0) + 1;
            }
            
            await update(pollRef, updates);
        };

        window.deletePoll = async function(pollId) {
            if (!confirm('Bu sorğunu silmək istədiyinizə əminsiniz?')) return;
            
            try {
                await remove(ref(db, `polls/${pollId}`));
                if (currentOpenPollId === pollId) {
                    closeNewsDetail();
                }
            } catch (error) {
                console.error('Sorğu silmə xətası:', error);
                alert('Sorğu silinmədi!');
            }
        };

        window.showPollVoters = async function(pollId, optionIndex) {
            const pollRef = ref(db, `polls/${pollId}`);
            const snapshot = await get(pollRef);
            const poll = snapshot.val();
            
            if (!poll || !poll.votes) return;
            
            const voters = [];
            Object.entries(poll.votes).forEach(([username, voteIdx]) => {
                if (voteIdx === optionIndex) {
                    voters.push(username);
                }
            });
            
            if (voters.length === 0) {
                alert('Bu variantı heç kim seçməyib');
                return;
            }
            
            const voterList = voters.join(', ');
            alert(`"${poll.options[optionIndex]}" variantını seçənlər:\n\n${voterList}`);
        };

        async function notifyAllUsersAboutPoll(pollTitle) {
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            
            const notifications = [];
            snapshot.forEach((child) => {
                const user = child.val();
                if (user.username !== currentUser.username) {
                    notifications.push({
                        to: user.username,
                        notif: {
                            from: 'Sistem',
                            message: `Yeni sorğu: "${pollTitle.substring(0, 30)}${pollTitle.length > 30 ? '...' : ''}"`,
                            timestamp: Date.now(),
                            read: false,
                            shown: false,
                            type: 'news'
                        }
                    });
                }
            });
            
            for (let n of notifications) {
                const notifRef = ref(db, `users/${n.to}/notifications`);
                await push(notifRef, n.notif);
            }
        }

        // ==================== HR ADMIN FUNKSİYALLIĞI ====================

        window.openNewsModal = function() {
            editingNewsId = null;
            document.getElementById('modalTitle').innerText = 'Yeni Xəbər';
            document.getElementById('newsTitle').value = '';
            document.getElementById('newsContent').value = '';
            document.getElementById('fileList').innerHTML = '';
            attachedFiles = [];
            document.getElementById('newsModal').classList.remove('hidden');
        };

        window.closeNewsModal = function() {
            document.getElementById('newsModal').classList.add('hidden');
            editingNewsId = null;
            attachedFiles = [];
        };

        window.handleFileSelect = async function(event) {
            const files = event.target.files;
            if (!files.length) return;
            
            for (let file of files) {
                if (file.size > 10 * 1024 * 1024) {
                    alert(`${file.name} çox böyükdür! Maksimum 10MB.`);
                    continue;
                }
                
                try {
                    const base64 = await fileToBase64(file);
                    attachedFiles.push({
                        name: file.name,
                        type: file.type,
                        size: file.size,
                        data: base64
                    });
                    renderFileList();
                } catch (err) {
                    console.error('Fayl xətası:', err);
                }
            }
            
            event.target.value = '';
        };

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        function renderFileList() {
            const container = document.getElementById('fileList');
            if (attachedFiles.length === 0) {
                container.innerHTML = '';
                return;
            }
            
            let html = '<div class="flex flex-wrap gap-2 mt-3">';
            attachedFiles.forEach((file, index) => {
                const isImage = file.type.startsWith('image/');
                const icon = isImage ? 'image' : 'description';
                
                html += `
                    <div class="flex items-center gap-2 bg-gray-100 rounded-lg px-3 py-2 text-sm">
                        <span class="material-symbols-outlined text-[#2d328f]">${icon}</span>
                        <span class="truncate max-w-[150px]">${file.name}</span>
                        <button onclick="removeFile(${index})" class="text-red-500 hover:text-red-700">
                            <span class="material-symbols-outlined text-sm">close</span>
                        </button>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        window.removeFile = function(index) {
            attachedFiles.splice(index, 1);
            renderFileList();
        };

        window.saveNews = async function() {
            const title = document.getElementById('newsTitle').value.trim();
            const content = document.getElementById('newsContent').value.trim();
            
            if (!title || !content) {
                alert('Başlıq və mətn doldurulmalıdır!');
                return;
            }
            
            try {
                const newsData = {
                    title: title,
                    content: content,
                    category: document.getElementById('newsCategory').value,
                    author: currentUser.username,
                    authorDept: currentUser.email || currentUser.department || 'Naməlum',
                    timestamp: Date.now(),
                    files: attachedFiles,
                    votes: {},
                    voteCount: 0,
                    isPinned: false,
                    pinnedAt: null
                };
                
                if (editingNewsId) {
                    const existingRef = ref(db, `news/${editingNewsId}`);
                    const snapshot = await get(existingRef);
                    const existing = snapshot.val() || {};
                    
                    await update(existingRef, {
                        title: title,
                        content: content,
                        category: document.getElementById('newsCategory').value,
                        editedAt: Date.now(),
                        files: attachedFiles.length > 0 ? attachedFiles : (existing.files || [])
                    });
                } else {
                    const newsRef = ref(db, 'news');
                    await push(newsRef, newsData);
                    
                    // YENI: Bildiriş göndər (type: 'news' ilə)
                    await notifyAllUsers(title);
                }
                
                closeNewsModal();
                
            } catch (error) {
                console.error('Xəta:', error);
                alert('Xəbər saxlanılmadı!');
            }
        };

        window.togglePin = async function(newsId) {
            const newsRef = ref(db, `news/${newsId}`);
            const snapshot = await get(newsRef);
            const news = snapshot.val();
            
            if (!news) return;
            
            const newPinState = !news.isPinned;
            const updates = {
                isPinned: newPinState,
                pinnedAt: newPinState ? Date.now() : null
            };
            
            await update(newsRef, updates);
        };

        window.editNews = async function(newsId) {
            const newsRef = ref(db, `news/${newsId}`);
            const snapshot = await get(newsRef);
            const news = snapshot.val();
            
            if (!news) return;
            
            editingNewsId = newsId;
            document.getElementById('modalTitle').innerText = 'Xəbəri Redaktə Et';
            document.getElementById('newsTitle').value = news.title;
            document.getElementById('newsContent').value = news.content;
            document.getElementById('newsCategory').value = news.category || 'general';
            attachedFiles = news.files || [];
            renderFileList();
            document.getElementById('newsModal').classList.remove('hidden');
        };

        window.deleteNews = async function(newsId) {
            if (!confirm('Bu xəbəri silmək istədiyinizə əminsiniz?')) return;
            
            try {
                await remove(ref(db, `comments/${newsId}`));
                await remove(ref(db, `news/${newsId}`));
                // Əgər detal modal açıqdısa, bağla
                if (currentOpenNewsId === newsId) {
                    closeNewsDetail();
                }
            } catch (error) {
                console.error('Silme xətası:', error);
                alert('Silinmədi!');
            }
        };

        window.searchNews = function() {
            const term = document.getElementById('searchNews').value.toLowerCase();
            const cards = document.querySelectorAll('.news-card');
            
            cards.forEach(card => {
                const title = card.querySelector('h3')?.innerText.toLowerCase() || '';
                const content = card.querySelector('.line-clamp-3')?.innerText.toLowerCase() || 
                               card.querySelector('.line-clamp-2')?.innerText.toLowerCase() || '';
                
                if (title.includes(term) || content.includes(term)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        };

        window.filterByCategory = function() {
            const category = document.getElementById('filterCategory').value;
            const cards = document.querySelectorAll('.news-card');
            
            cards.forEach(card => {
                const cardCategory = card.getAttribute('data-category') || 'general';
                const isPoll = card.id.startsWith('poll-');
                
                if (category === 'all') {
                    card.style.display = 'flex';
                } else if (isPoll) {
                    card.style.display = 'none';
                } else if (cardCategory === category) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        };

        async function notifyAllUsers(newsTitle) {
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            
            const notifications = [];
            snapshot.forEach((child) => {
                const user = child.val();
                if (user.username !== currentUser.username) {
                    notifications.push({
                        to: user.username,
                        notif: {
                            from: 'Sistem',

                            timestamp: Date.now(),

                            type: 'news'  // YENI: type əlavə edildi
                        }
                    });
                }
            });
            
            for (let n of notifications) {

        window.vote = async function(newsId, type) {
            const newsRef = ref(db, `news/${newsId}`);
            const snapshot = await get(newsRef);
            const news = snapshot.val();
            
            if (!news) return;
            
            const currentVote = news.votes?.[currentUser.username];
            let newVoteCount = news.voteCount || 0;
            let updates = {};
            
            if (currentVote === type) {
                updates[`votes/${currentUser.username}`] = null;
                newVoteCount += (type === 'up' ? -1 : 1);
            } else {
                if (currentVote) {
                    newVoteCount += (currentVote === 'up' ? -1 : 1);
                }
                updates[`votes/${currentUser.username}`] = type;
                newVoteCount += (type === 'up' ? 1 : -1);
            }
            
            updates['voteCount'] = newVoteCount;
            
            await update(newsRef, updates);
        };

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

                        <input type="text" id="pollTitle" placeholder="Sorğu daxil edin..." 
                               class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-[#333333] focus:border-[#10b981] focus:outline-none transition-all">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-[#333333] mb-2">Məzmun / Açıqlama</label>
                        <textarea id="pollContent" rows="3" placeholder="Sorğunu açıqlayın.." 
                                  class="w-full bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 text-[#333333] focus:border-[#10b981] focus:outline-none transition-all resize-none"></textarea>
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium text-[#333333] mb-2">Variantlar</label>
                        <div id="pollOptionsList" class="space-y-2">
                            <!-- Variantlar buraya dinamik əlavə olunacaq -->
                        </div>
                        <button onclick="addPollOption()" class="mt-2 flex items-center gap-2 text-[#10b981] hover:text-[#059669] text-sm font-medium transition-all">
                            <span class="material-symbols-outlined text-sm">add_circle</span>
                            Yeni Variant Əlavə Et
                        </button>
                    </div>
                </div>
            </div>
            
            <div class="px-6 py-4 border-t border-[#10b981]/20 flex justify-end gap-3 bg-gray-50">
                <button onclick="closePollModal()" class="px-6 py-2 text-[#333333] hover:bg-gray-200 rounded-lg transition-all">
                    Ləğv et
                </button>
                <button onclick="savePoll()" class="px-6 py-2 bg-gradient-to-r from-[#10b981] to-[#059669] text-white rounded-lg hover:shadow-lg transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined text-sm">check</span>
                    Sorğunu Yarat
                </button>
            </div>
        </div>
    </div>

    <!-- YENI: Xəbər/Sorğu Detal Modalı (Ətraflı Baxış) - BAĞLAMA DÜYMƏSİ FIXED -->
    <div id="newsDetailModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-hidden shadow-[0_0_60px_rgba(45,50,143,0.4)] animate-fadeIn flex flex-col">
            <!-- Fixed Header with Close Button -->
            <div class="px-6 py-4 border-b border-[#2d328f]/20 flex items-center justify-between bg-gradient-to-r from-[#2d328f] to-[#1b66ea] text-white flex-shrink-0">
                <h3 id="detailModalTitle" class="text-xl font-bold truncate pr-4">Xəbər Başlığı</h3>
                <button onclick="closeNewsDetail()" class="text-white/80 hover:text-white transition-colors p-1 hover:bg-white/10 rounded-lg">
                    <span class="material-symbols-outlined text-2xl">close</span>
                </button>
            </div>
            
            <!-- Scrollable Content -->
            <div id="detailModalContent" class="p-6 overflow-y-auto custom-scroll flex-1">
                <!-- Dinamik içerik buraya yüklənəcək -->
            </div>
        </div>
    </div>

    <div class="hidden">
        <span id="currentUserDisplay"></span>
    </div>

     <!-- Music Player -->
    <script src="music-player.js"></script>
    <script>
        // Dərhal init et, ama DOM ready gözlə
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                setTimeout(function() {
                    if (window.MusicPlayer) MusicPlayer.init();
                }, 100);
            });
        } else {
            // DOM artıq ready-dir
            setTimeout(function() {
                if (window.MusicPlayer) MusicPlayer.init();
            }, 100);
        }
    </script>

</body>
</html>
